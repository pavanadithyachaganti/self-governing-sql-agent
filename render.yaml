# Render blueprint — one free web service built from the Dockerfile.
# Deploy: render.com → New → Blueprint → pick this repo. Or New → Web Service →
# this repo → runtime Docker.
services:
  - type: web
    name: self-governing-sql-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Runs keyless in mock mode by default. For real answers, set
      # LLM_PROVIDER=anthropic here (or in the dashboard) and add the API key
      # below. If the key is missing the app safely falls back to mock.
      - key: LLM_PROVIDER
        value: mock
      - key: ANTHROPIC_API_KEY
        sync: false        # set the value in the Render dashboard, not in git
